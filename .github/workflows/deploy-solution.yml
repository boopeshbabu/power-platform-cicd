name: Deploy Power Platform Solution

on:
  workflow_dispatch:
    inputs:
      solution_name:
        description: 'Solution name to deploy'
        required: true
        type: choice
        default: 'ExportSolution'
        options:
          - ExportSolution
          - Contact
          - Account
      solution_zip:
        description: 'Name of the packaged solution ZIP file'
        required: true
        type: string
        default: 'ExportSolution.zip'
      import_settings_file:
        description: 'Deployment settings JSON file to use for import'
        required: true
        type: string
        default: 'deploy-settings.json'
      deploy_stage:
        description: 'Deployment stage/environment name'
        required: true
        type: choice
        default: 'dev'
        options:
          - dev
          - test
      import_solution:
        description: 'Import package'
        required: false
        type: boolean
        default: true
      upgrade_solution:
        description: 'Upgrade package'
        required: false
        type: boolean
        default: false
      update_solution:
        description: 'Update package'
        required: false
        type: boolean
        default: false
      publish_changes:
        description: 'Publish changes after import'
        required: false
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: windows-latest
    environment: ${{ inputs.deploy_stage }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Power Platform tools
        uses: microsoft/powerplatform-actions/actions-install@v1
        with:
          add-tools-to-path: true

      - name: Authenticate to Dataverse
        shell: pwsh
        run: |
          pac auth create --url ${{ secrets.DATAVERSE_URL }} --name pipelineAuth --applicationId ${{ secrets.DATAVERSE_CLIENT_ID }} --clientSecret ${{ secrets.DATAVERSE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}
          pac auth select --name pipelineAuth

      - name: Download solution artifact
        uses: actions/download-artifact@v4
        with:
          name: solution-package
          path: ./artifact

      - name: Import solution into environment
        shell: pwsh
        run: |
          $packagePath = Join-Path $PWD 'artifact' '${{ inputs.solution_zip }}'
          $importSelected = '${{ inputs.import_solution }}' -eq 'true'
          $upgradeSelected = '${{ inputs.upgrade_solution }}' -eq 'true'
          $updateSelected = '${{ inputs.update_solution }}' -eq 'true'

          if (($importSelected -and $upgradeSelected) -or ($importSelected -and $updateSelected) -or ($upgradeSelected -and $updateSelected)) {
            throw 'Select only one deployment action.'
          }

          $action = if ($upgradeSelected) { 'upgrade' } elseif ($updateSelected) { 'update' } else { 'import' }
          $flags = switch ($action) {
            'import' { '--force-overwrite' }
            'upgrade' { '--stage-and-upgrade' }
            'update' { '--skip-lower-version' }
            default { throw "Unsupported deployment_action: $action" }
          }
          $publishFlag = if ('${{ inputs.publish_changes }}' -eq 'true') { '--publish-changes' } else { '' }

          pac solution import --path $packagePath --settings-file "${{ inputs.import_settings_file }}" $flags $publishFlag
