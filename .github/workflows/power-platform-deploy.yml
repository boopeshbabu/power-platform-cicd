name: Power Platform CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      solution_name:
        description: 'Logical or friendly name of the solution being deployed'
        required: true
        default: 'ExportSolution'
      solution_source:
        description: 'Folder or zip file containing the solution source'
        required: true
        default: 'ExportSolution'
      solution_zip:
        description: 'Name of the packaged solution ZIP file'
        required: true
        default: 'ExportSolution.zip'
      import_settings_file:
        description: 'Deployment settings JSON file to use for import'
        required: true
        default: 'deploy-settings.json'
      deploy_stage:
        description: 'Deployment stage/environment name (configured in GitHub Environments)'
        required: true
        default: 'dev'
        options:
          - dev
          - test
          - prod
      import_mode:
        description: 'Import mode for the solution deployment'
        required: true
        default: 'overwrite'
        options:
          - overwrite
          - upgrade
          - skip_lower_version
      publish_changes:
        description: 'Publish changes after import'
        required: true
        default: 'true'
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: Build solution package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Power Platform tools
        uses: microsoft/powerplatform-actions/actions-install@v1
        with:
          add-tools-to-path: true

      - name: Package or copy solution artifact
        id: pack_solution
        shell: pwsh
        run: |
          $source = "${{ inputs.solution_source || 'ExportSolution' }}"
          $zipfile = "${{ inputs.solution_zip || 'ExportSolution.zip' }}"

          if (Test-Path $source -PathType Container) {
            Write-Host "Packing solution folder '$source' into '$zipfile'"
            pac solution pack --folder $source --zipfile $zipfile --packagetype Unmanaged --allowWrite --clobber
          } elseif (Test-Path $source -PathType Leaf) {
            Write-Host "Reusing existing solution zip '$source'"
            Copy-Item -Path $source -Destination $zipfile -Force
          } else {
            throw "Solution source path not found: $source"
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "solution_zip_path=$PWD\$zipfile"

      - name: Upload solution artifact
        uses: actions/upload-artifact@v4
        with:
          name: solution-package
          path: ${{ steps.pack_solution.outputs.solution_zip_path }}

  deploy:
    name: Deploy solution to stage
    needs: build
    runs-on: windows-latest
    environment: ${{ inputs.deploy_stage }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Power Platform CLI
        uses: microsoft/powerplatform-actions/setup-powerplatform-cli@v1

      - name: Download solution artifact
        uses: actions/download-artifact@v4
        with:
          name: solution-package
          path: ./artifact

      - name: Authenticate to Dataverse
        shell: pwsh
        run: |
          pac auth create --url ${{ secrets.DATAVERSE_URL }} --name pipelineAuth --client-id ${{ secrets.DATAVERSE_CLIENT_ID }} --client-secret ${{ secrets.DATAVERSE_CLIENT_SECRET }} --tenant-id ${{ secrets.AZURE_TENANT_ID }}
          pac auth select --name pipelineAuth

      - name: Import solution into target environment
        shell: pwsh
        run: |
          $packagePath = Join-Path $PWD 'artifact' '${{ inputs.solution_zip }}'
          $mode = '${{ inputs.import_mode }}'
          $flags = switch ($mode) {
            'overwrite' { '--force-overwrite' }
            'upgrade' { '--stage-and-upgrade' }
            'skip_lower_version' { '--skip-lower-version' }
            default { throw "Unsupported import_mode: $mode" }
          }
          $publish = '${{ inputs.publish_changes }}' -eq 'true'
          $publishFlag = if ($publish) { '--publish-changes' } else { '' }

          pac solution import --path $packagePath --settings-file "${{ inputs.import_settings_file }}" $flags $publishFlag
